<h1>Lista de Tareas</h1>

<div style="margin-bottom:20px;">
  <input 
    type="text"
    placeholder="Escribe tu tarea"
    [(ngModel)]="nuevaTarea"
    (keyup.enter)="agregarTarea()"
    style="padding:8px; width:250px;"
  />

  <button (click)="agregarTarea()" style="padding:8px;">
    Agregar
  </button>
</div>

<ul>
  <li *ngFor="let tarea of tareas">
    {{ tarea.descripcion }}
    <button (click)="eliminarTarea(tarea._id!)">
      ELIMINAR
    </button>
  </li>
</ul>
