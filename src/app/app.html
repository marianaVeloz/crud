<div class="container">

  <h1>Tareas</h1>

  <div class="card">
    <h2>Obtener tareas</h2>
    <button class="btn-get" (click)="verTareas()">
      Ver tareas
    </button>
  </div>

  <div class="card">
    <h2>Nueva tarea</h2>
    <input 
      type="text"
      placeholder="Escribe tu tarea"
      [(ngModel)]="nuevaTarea"
      (keyup.enter)="agregarTarea()"
    />
    <button class="btn-add" (click)="agregarTarea()">
      Agregar
    </button>
  </div>

  <div class="card">
    <h2>Lista de tareas</h2>
    <ul>
      <li *ngFor="let tarea of tareas">
        {{ tarea.descripcion }}
        <button class="btn-delete" (click)="tarea._id && eliminarTarea(tarea._id)">
          Eliminar
        </button>
      </li>
    </ul>
  </div>

</div>
